<html>
    <head>
        <script>
            window.onload = function() {
                var baseUrl = "https://meowcare.art";
                var hash = window.location.hash;
                if (hash && hash.length > 1) {
                    var tracking = hash.substring(1);
                    window.location.href = baseUrl + tracking;
                } else {
                    window.location.href = baseUrl;
                }
            };
        </script>
    </head>

    </body>
</html>
